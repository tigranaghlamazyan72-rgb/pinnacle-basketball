name: Basketball Line Parser Cron

on:
  schedule:
    - cron: '*/10 * * * *' # Запускать каждые 10 минут
  workflow_dispatch: # Добавляет кнопку ручного запуска в GitHub

jobs:
  run-parser:
    runs-on: ubuntu-latest
    steps:
    - name: Копируем файлы репозитория
      uses: actions/checkout@v3

    - name: Включаем Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Устанавливаем библиотеки
      run: |
        pip install requests firebase-admin

    - name: Запускаем парсер
      env:
        FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      run: python parser.py
